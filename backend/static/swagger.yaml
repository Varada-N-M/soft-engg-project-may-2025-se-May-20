openapi: 3.0.0
info:
  title: GrowWise API
  description: API documentation for the GrowWise application, which includes user
    authentication, child-parent linking, student habits, gratitude entries, AI-powered features and organization statistics.
  version: '2.0'
tags:
- name: Auth
  description: Authentication and user management
- name: Parent
  description: Parent-specific operations
- name: Student
  description: Student-specific operations
- name: Teacher
  description: Teacher-specific operations
- name: Organization
  description: Organization-specific operations
- name: AI
  description: AI-powered features for students
paths:
  /api/login:
    post:
      tags:
      - Auth
      summary: User login
      description: Authenticates a user and returns an access and refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
                role_type:
                  type: string
      responses:
        '200':
          description: Login successful
  /api/refresh-token:
    post:
      tags:
      - Auth
      summary: Refresh access token
      description: Returns a new access token for the user.
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Token refreshed successfully
  /api/child/register:
    post:
      tags:
      - Auth
      summary: Register a new child user
      description: Creates a new user with the 'child' role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
                first_name:
                  type: string
                last_name:
                  type: string
                dob:
                  type: string
                  format: date
                class:
                  type: integer
                school_name:
                  type: string
                gender:
                  type: string
      responses:
        '201':
          description: Child registered successfully
  /api/parent/register:
    post:
      tags:
      - Auth
      summary: Register a new parent user
      description: Creates a new user with the 'parent' role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
                first_name:
                  type: string
                last_name:
                  type: string
                phone_number:
                  type: string
      responses:
        '201':
          description: Parent registered successfully
  /api/organization/register:
    post:
      tags:
      - Auth
      summary: Register a new organization
      description: Creates a new user with the 'organization' role and an associated
        organization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
                first_name:
                  type: string
                last_name:
                  type: string
                organization_name:
                  type: string
                phone_number:
                  type: string
                address:
                  type: string
      responses:
        '201':
          description: Organization registered successfully
  /api/teacher/register:
    post:
      tags:
      - Auth
      summary: Register a new teacher user
      description: Creates a new user with the 'teacher' or 'principal' role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
                first_name:
                  type: string
                last_name:
                  type: string
                subject:
                  type: string
                school_id:
                  type: integer
      responses:
        '201':
          description: Teacher registered successfully
  /api/admin/register:
    post:
      tags:
      - Auth
      summary: Register a new admin user
      description: Creates a new user with the 'admin' role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
                first_name:
                  type: string
                last_name:
                  type: string
      responses:
        '201':
          description: Admin registered successfully
  /api/admin/add-school:
    post:
      tags:
      - Teacher
      summary: Create a new school
      description: Creates a new school. Only accessible by principal.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                phone_number:
                  type: string
                address:
                  type: string
      responses:
        '201':
          description: School created successfully
  /api/schools:
    get:
      tags:
      - Teacher
      summary: Get all schools
      description: Get all available schools for registration.
      responses:
        '200':
          description: A list of schools
  /api/auth/forgot-password:
    post:
      tags:
      - Auth
      summary: Forgot password
      description: Sends a password reset link to the user's email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
      responses:
        '200':
          description: If the email exists, a reset link has been sent.
  /api/auth/reset-password:
    post:
      tags:
      - Auth
      summary: Reset password
      description: Resets the user's password using a token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                new_password:
                  type: string
      responses:
        '200':
          description: Password reset successfully
  /api/auth/change-password:
    post:
      tags:
      - Auth
      summary: Change password
      description: Changes the password of the logged-in user.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                old_password:
                  type: string
                new_password:
                  type: string
      responses:
        '200':
          description: Password changed successfully
  /api/child/gratitude:
    post:
      tags:
      - Student
      summary: Create a gratitude entry
      description: Creates a new gratitude entry for the logged-in child.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                gratitude_text:
                  type: string
      responses:
        '201':
          description: Gratitude entry created successfully
    get:
      tags:
      - Student
      summary: Get gratitude entries
      description: Retrieves gratitude entries for the logged-in child.
      security:
      - bearerAuth: []
      parameters:
      - in: query
        name: date
        schema:
          type: string
          format: date
        description: Filter by date (DD-MM-YY)
      - in: query
        name: days
        schema:
          type: integer
        description: Filter by last N days
      responses:
        '200':
          description: A list of gratitude entries
  /api/child/gratitude/{entry_id}:
    put:
      tags:
      - Student
      summary: Update a gratitude entry
      description: Updates a specific gratitude entry for the logged-in child.
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: entry_id
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                gratitude_text:
                  type: string
      responses:
        '200':
          description: Gratitude entry updated successfully
    delete:
      tags:
      - Student
      summary: Delete a gratitude entry
      description: Deletes a specific gratitude entry for the logged-in child.
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: entry_id
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Gratitude entry deleted successfully
  /api/child/habit:
    post:
      tags:
      - Student
      summary: Create a new habit
      description: Creates a new habit for the logged-in child.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                habit_name:
                  type: string
                habit_description:
                  type: string
                habit_category:
                  type: string
                habit_xp:
                  type: integer
      responses:
        '201':
          description: Habit created successfully
    get:
      tags:
      - Student
      summary: Get all habits
      description: Retrieves all habits for the logged-in child.
      security:
      - bearerAuth: []
      responses:
        '200':
          description: A list of habits
  /api/child/habit/{habit_id}:
    put:
      tags:
      - Student
      summary: Update a habit
      description: Updates a specific habit for the logged-in child.
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: habit_id
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                habit_name:
                  type: string
                habit_description:
                  type: string
                habit_category:
                  type: string
                habit_xp:
                  type: integer
      responses:
        '200':
          description: Habit updated successfully
    delete:
      tags:
      - Student
      summary: Delete a habit
      description: Deletes a specific habit for the logged-in child.
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: habit_id
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Habit deleted successfully
  /api/child/habit/{habit_id}/complete:
    post:
      tags:
      - Student
      summary: Complete a habit
      description: Marks a habit as complete for the logged-in child.
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: habit_id
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Habit marked as complete
  /api/todos:
    post:
      tags:
      - Student
      summary: Create a to-do item
      description: Creates a new to-do item for the logged-in child.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                to_do:
                  type: string
                description:
                  type: string
                is_daily:
                  type: boolean
                completion_date:
                  type: string
                  format: date-time
      responses:
        '201':
          description: To-do item created successfully
    get:
      tags:
      - Student
      summary: Get to-do items
      description: Retrieves to-do items for the logged-in child.
      security:
      - bearerAuth: []
      responses:
        '200':
          description: A list of to-do items
  /api/todos/{todo_id}:
    put:
      tags:
      - Student
      summary: Update a to-do item
      description: Updates a specific to-do item for the logged-in child.
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: todo_id
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                to_do:
                  type: string
                description:
                  type: string
                is_daily:
                  type: boolean
                is_done:
                  type: boolean
                completion_date:
                  type: string
                  format: date-time
      responses:
        '200':
          description: To-do item updated successfully
    delete:
      tags:
      - Student
      summary: Delete a to-do item
      description: Deletes a specific to-do item for the logged-in child.
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: todo_id
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: To-do item deleted successfully
  /api/child/lesson-updates:
    get:
      tags:
      - Student
      summary: Get lesson updates
      description: Get all lesson updates for the logged-in child user.
      security:
      - bearerAuth: []
      responses:
        '200':
          description: A list of lesson updates
  /api/child/skills:
    get:
      tags:
      - Student
      summary: Get all skills
      description: Get all skills for the logged-in child user, including completed
        skills.
      security:
      - bearerAuth: []
      responses:
        '200':
          description: A list of skills
    post:
      tags:
      - Student
      summary: Add a new skill
      description: Add a new skill to the common skills list.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                skill_name:
                  type: string
                video_url:
                  type: string
                skill_xp:
                  type: integer
      responses:
        '201':
          description: Skill added successfully
  /api/child/skills/{skill_id}:
    put:
      tags:
      - Student
      summary: Update a skill
      description: Update an existing skill.
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: skill_id
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                skill_name:
                  type: string
                video_url:
                  type: string
                skill_xp:
                  type: integer
      responses:
        '200':
          description: Skill updated successfully
    delete:
      tags:
      - Student
      summary: Delete a skill
      description: Delete a skill.
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: skill_id
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Skill deleted successfully
  /api/child/skills/{skill_id}/complete:
    post:
      tags:
      - Student
      summary: Complete a skill
      description: Mark a skill as learned by the logged-in child user.
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: skill_id
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Skill marked as learned successfully
  /api/child/profile:
    get:
      tags:
      - Student
      summary: Get student profile
      description: Get the profile of the logged-in child user.
      security:
      - bearerAuth: []
      responses:
        '200':
          description: The student's profile
  /api/child/badge/count:
    get:
      tags:
      - Student
      summary: Get badge count
      description: Get the total number of badges for the logged-in child user.
      security:
      - bearerAuth: []
      parameters:
      - in: query
        name: earned
        schema:
          type: boolean
      responses:
        '200':
          description: The number of badges
  /api/child/skills/completed/count:
    get:
      tags:
      - Student
      summary: Get completed skills count
      description: Get the total number of completed (learned) skills for the logged-in
        child user.
      security:
      - bearerAuth: []
      responses:
        '200':
          description: The number of completed skills
  /api/child/badges/earned:
    get:
      tags:
      - Student
      summary: Get earned badges
      description: Get all earned badges for the logged-in child user.
      security:
      - bearerAuth: []
      responses:
        '200':
          description: A list of earned badges
  /api/child/improve-sentence:
    post:
      tags:
      - AI
      summary: Improve a sentence
      description: Improve a sentence using AI - child-friendly version.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sentence:
                  type: string
      responses:
        '200':
          description: The improved sentence
  /api/child/analyze-writing:
    post:
      tags:
      - AI
      summary: Analyze writing
      description: Analyze longer writing pieces - child-friendly version
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
                type:
                  type: string
      responses:
        '200':
          description: The analysis of the writing
  /api/child/grammar-check:
    post:
      tags:
      - AI
      summary: Grammar check
      description: Kid-friendly grammar check with AI enhancement
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
      responses:
        '200':
          description: The grammar check results
  /api/child/vocabulary-suggestions:
    post:
      tags:
      - AI
      summary: Vocabulary suggestions
      description: Kid-friendly vocabulary improvement suggestions
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
      responses:
        '200':
          description: A list of vocabulary suggestions
  /api/child/story-starter:
    get:
      tags:
      - AI
      summary: Story starter
      description: Get fun story starters for kids
      responses:
        '200':
          description: A story starter
  /api/parent/link-child:
    post:
      tags:
      - Parent
      summary: Link a child to a parent
      description: Links a child to the logged-in parent using the child's unique
        key.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                child_key:
                  type: string
      responses:
        '201':
          description: Child linked successfully
  /api/parent/unlink-child/{child_id}:
    put:
      tags:
      - Parent
      summary: Unlink a child from a parent
      description: Unlinks a child from the logged-in parent.
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: child_id
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Child unlinked successfully
  /api/parent/profile:
    get:
      tags:
      - Parent
      summary: Get parent profile
      description: Get the profile of the logged-in parent user.
      security:
      - bearerAuth: []
      responses:
        '200':
          description: The parent's profile
  /api/parent/linked-children:
    get:
      tags:
      - Parent
      summary: Get linked children
      description: Get all children linked to the current parent.
      security:
      - bearerAuth: []
      responses:
        '200':
          description: A list of linked children
  /api/parent/children/lesson-updates:
    get:
      tags:
      - Parent
      summary: Get children's lesson updates
      description: Get lesson updates for all children linked to the current parent.
      security:
      - bearerAuth: []
      responses:
        '200':
          description: A list of lesson updates
  /api/parent/children/{child_id}/habits:
    get:
      tags:
      - Parent
      summary: Get child's habits
      description: Get detailed habits data for a specific child.
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: child_id
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: A list of habits
  /api/parent/children/{child_id}/skills:
    get:
      tags:
      - Parent
      summary: Get child's skills
      description: Get detailed skills data for a specific child.
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: child_id
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: A list of skills
  /api/parent/children/{child_id}/badges:
    get:
      tags:
      - Parent
      summary: Get child's badges
      description: Get badges earned by a specific child.
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: child_id
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: A list of badges
  /api/parent/children/{child_id}/todos:
    get:
      tags:
      - Parent
      summary: Get child's to-dos
      description: Get todos for a specific child.
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: child_id
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: A list of to-dos
  /api/parent/children/{child_id}/weekly-report:
    get:
      tags:
      - Parent
      summary: Get child's weekly report
      description: Get weekly progress report for a specific child.
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: child_id
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: The weekly report
  /api/teacher/add-student:
    post:
      tags:
      - Teacher
      summary: Add a student to a teacher's class
      description: Adds a student to the logged-in teacher's class using the student's
        email.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                student_email:
                  type: string
      responses:
        '201':
          description: Student added successfully
  /api/teacher/remove-student/{student_id}:
    delete:
      tags:
      - Teacher
      summary: Remove a student from a teacher's class
      description: Removes a student from the logged-in teacher's class.
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: student_id
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Student removed successfully
  /api/teacher/lesson-updates:
    post:
      tags:
      - Teacher
      summary: Create a lesson update
      description: Creates a new lesson update for the logged-in teacher's class.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                day:
                  type: string
                subject:
                  type: string
                lesson:
                  type: string
                activity:
                  type: string
                class_:
                  type: integer
      responses:
        '201':
          description: Lesson update created successfully
    get:
      tags:
      - Teacher
      summary: Get lesson updates
      description: Get all lesson updates for the logged-in teacher user.
      security:
      - bearerAuth: []
      responses:
        '200':
          description: A list of lesson updates
  /api/teacher/lesson-updates/{lesson_id}:
    put:
      tags:
      - Teacher
      summary: Update a lesson update
      description: Update a specific lesson update by ID.
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: lesson_id
        required: true
        schema:
          type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                day:
                  type: string
                subject:
                  type: string
                lesson:
                  type: string
                activity:
                  type: string
                class_:
                  type: integer
      responses:
        '200':
          description: Lesson update updated successfully
    delete:
      tags:
      - Teacher
      summary: Delete a lesson update
      description: Delete a specific lesson update by ID.
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: lesson_id
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Lesson update deleted successfully
  /api/teacher/link-student:
    post:
      tags:
      - Teacher
      summary: Link a student to a teacher
      description: Link a student to a teacher using the student's email.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                student_email:
                  type: string
      responses:
        '201':
          description: Student linked successfully
  /api/teacher/unlink-student/{student_id}:
    delete:
      tags:
      - Teacher
      summary: Unlink a student from a teacher
      description: Unlink a student from a teacher.
      security:
      - bearerAuth: []
      parameters:
      - in: path
        name: student_id
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Student unlinked successfully
  /api/teacher/profile:
    get:
      tags:
      - Teacher
      summary: Get teacher profile
      description: Get the profile of the logged-in teacher user.
      security:
      - bearerAuth: []
      responses:
        '200':
          description: The teacher's profile
  /api/teacher/linked-students:
